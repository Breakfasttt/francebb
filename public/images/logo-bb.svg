<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Map of France outline (stylized) -->
  <path d="M40 80C30 90 20 110 30 130C40 150 60 160 80 170C100 180 120 175 140 165C160 155 180 140 175 110C170 80 150 60 130 50C110 40 90 45 70 50C50 55 45 65 40 80Z" stroke="#002395" stroke-width="2" fill="white" fill-opacity="0.1"/>
  <path d="M140 165L160 180L180 170L175 140" stroke="#ED2939" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Shield Background -->
  <path d="M50 40H150V90C150 130 100 160 100 160C100 160 50 130 50 90V40Z" fill="white" stroke="#002b5c" stroke-width="4"/>
  
  <!-- "FRANCE" Header -->
  <rect x="52" y="42" width="96" height="35" fill="white"/>
  <text x="100" y="70" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="24" fill="#ED2939" font-weight="900" style="letter-spacing:-1px">FRANCE</text>
  <line x1="50" y1="78" x2="150" y2="78" stroke="#002b5c" stroke-width="2"/>
  
  <!-- Stripes -->
  <rect x="52" y="79" width="16" height="50" fill="#002395"/>
  <rect x="85" y="79" width="16" height="65" fill="#002395"/>
  <rect x="118" y="79" width="16" height="65" fill="#002395"/>
  <rect x="145" y="79" width="3" height="30" fill="#002395"/>
  
  <!-- Spiked Football -->
  <g transform="translate(100, 115) rotate(15)">
    <ellipse cx="0" cy="0" rx="25" ry="15" fill="#c21d1d" stroke="black" stroke-width="1.5"/>
    <path d="M-10 -5L-5 5M0 -7L5 3M10 -5L15 5" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <!-- Spikes -->
    <path d="M-22 -10L-18 -2L-10 -12" fill="white" stroke="black" stroke-width="0.5"/>
    <path d="M0 -22L5 -15L10 -20" fill="white" stroke="black" stroke-width="0.5"/>
    <path d="M22 -10L18 -2L10 -12" fill="white" stroke="black" stroke-width="0.5" transform="rotate(180)"/>
    <path d="M-22 10L-18 2L-10 12" fill="white" stroke="black" stroke-width="0.5" transform="rotate(180, -18, 2)"/>
    <path d="M22 10L18 2L10 12" fill="white" stroke="black" stroke-width="0.5" transform="scale(-1, 1) rotate(180, 18, 2)"/>
  </g>
</svg>
